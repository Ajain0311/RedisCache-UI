<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cache Vault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .cache-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
    .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .glass-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 10px 30px -10px rgba(99,102,241,0.4); }
    .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* env pill buttons */
    .env-btn { padding: 0.4rem 1rem; border-radius: 9999px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .env-btn:not(.active) { background: rgba(255,255,255,0.05); color: #94a3b8; border-color: transparent; }
    .env-btn:not(.active):hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    .env-DEV.active  { background: #1d4ed8; color: #fff; border-color: #3b82f6; box-shadow: 0 0 14px rgba(59,130,246,0.45); }
    .env-TEST.active { background: #b45309; color: #fff; border-color: #f59e0b; box-shadow: 0 0 14px rgba(245,158,11,0.45); }
    .env-UAT.active  { background: #6d28d9; color: #fff; border-color: #a78bfa; box-shadow: 0 0 14px rgba(167,139,250,0.45); }
    .env-PROD.active { background: #991b1b; color: #fff; border-color: #ef4444; box-shadow: 0 0 14px rgba(239,68,68,0.55); }

    /* env banner strip */
    #envBanner { transition: background 0.35s; }
    .banner-DEV  { background: linear-gradient(90deg,#1e3a8a22,#1d4ed844,#1e3a8a22); border-bottom:1px solid #1d4ed855; }
    .banner-TEST { background: linear-gradient(90deg,#78350f22,#b4530944,#78350f22); border-bottom:1px solid #b4530955; }
    .banner-UAT  { background: linear-gradient(90deg,#4c1d9522,#6d28d944,#4c1d9522); border-bottom:1px solid #6d28d955; }
    .banner-PROD { background: linear-gradient(90deg,#7f1d1d33,#99171766,#7f1d1d33); border-bottom:1px solid #99171777; }
  </style>
</head>
<body>

  <!-- Environment banner -->
  <div id="envBanner" class="w-full py-2 px-6 flex items-center justify-center gap-3 text-xs font-semibold tracking-widest uppercase banner-DEV">
    <span id="bannerDot" class="h-2 w-2 rounded-full bg-blue-400 animate-pulse"></span>
    <span id="bannerLabel" class="text-blue-300">Connected to DEV &mdash; pcp-dev.e-connectsolutions.com</span>
  </div>

  <div class="p-6 md:p-10 max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
      <div>
        <h1 class="text-4xl font-bold tracking-tight">Cache <span class="gradient-text">Vault</span></h1>
        <p class="text-slate-400 mt-2 flex items-center gap-2">
          <span id="countBadge" class="bg-indigo-500/20 text-indigo-400 px-3 py-0.5 rounded-full text-sm font-semibold">0 Keys</span>
          Across <span id="activeCount" class="text-slate-200">0</span> Sources
        </p>
      </div>

      <!-- Controls row -->
      <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">

        <!-- Environment switcher -->
        <div class="flex items-center gap-1.5 bg-slate-800/60 border border-slate-700 rounded-2xl p-1.5">
          <button class="env-btn env-DEV  active" onclick="switchEnv('DEV')">DEV</button>
          <button class="env-btn env-TEST"         onclick="switchEnv('TEST')">TEST</button>
          <button class="env-btn env-UAT"          onclick="switchEnv('UAT')">UAT</button>
          <button class="env-btn env-PROD"         onclick="switchEnv('PROD')">PROD</button>
        </div>

        <!-- Source filter -->
        <select id="serviceFilter" onchange="filterData()" class="bg-slate-800 border border-slate-700 rounded-xl py-2.5 px-4 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
          <option value="all">All Sources</option>
        </select>

        <!-- Search -->
        <div class="relative flex-grow md:w-56">
          <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
          <input type="text" id="search" placeholder="Search keys..."
                 class="w-full bg-slate-800/50 border border-slate-700 rounded-xl py-2.5 pl-10 pr-4 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
        </div>

        <!-- Sync -->
        <button onclick="loadAllKeys()" class="p-2.5 bg-indigo-600 rounded-xl hover:bg-indigo-500 transition-all active:scale-95 shadow-lg flex items-center gap-2">
          <i data-lucide="refresh-cw" class="w-5 h-5"></i>
          <span class="hidden md:inline">Sync</span>
        </button>
      </div>
    </div>

    <div id="cardContainer" class="cache-grid"></div>
  </div>

<script>
  const ENVS = {
    DEV:  { label: 'DEV',  host: 'https://pcp-dev.e-connectsolutions.com',  dot: 'bg-blue-400',   text: 'text-blue-300',   bannerClass: 'banner-DEV'  },
    TEST: { label: 'TEST', host: 'https://pcp-test.e-connectsolutions.com', dot: 'bg-amber-400',  text: 'text-amber-300',  bannerClass: 'banner-TEST' },
    UAT:  { label: 'UAT',  host: 'https://pcpuat.e-connectsolutions.com',   dot: 'bg-violet-400', text: 'text-violet-300', bannerClass: 'banner-UAT'  },
    PROD: { label: 'PROD', host: 'https://digipb.punjab.gov.in',            dot: 'bg-red-400',    text: 'text-red-300',    bannerClass: 'banner-PROD' },
  };

  let currentEnv = 'DEV';

  function getBaseUrl() {
    return `${ENVS[currentEnv].host}/api/publicservice/Config`;
  }

  function buildRequestBody(apiParams) {
    return {
      ApiKey: "", OrgId: 0, ApiParams: apiParams,
      ResponseId: 0, Path: "", Module: "",
      UserId: 0, UserDetails: "", UserSessionModel: "",
      Language: "", FormAction: 0
    };
  }

  function switchEnv(key) {
    if (key === currentEnv) return;
    currentEnv = key;
    const env = ENVS[key];

    // Update pill buttons
    document.querySelectorAll('.env-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.env-${key}`).classList.add('active');

    // Update banner
    const banner = document.getElementById('envBanner');
    banner.className = `w-full py-2 px-6 flex items-center justify-center gap-3 text-xs font-semibold tracking-widest uppercase ${env.bannerClass}`;
    document.getElementById('bannerDot').className = `h-2 w-2 rounded-full ${env.dot} animate-pulse`;
    document.getElementById('bannerLabel').className = env.text;
    document.getElementById('bannerLabel').textContent = `Connected to ${env.label} — ${env.host.replace('https://','')}`;

    loadAllKeys();
  }

  let allKeysData = [];

  async function loadAllKeys() {
    const container = document.getElementById("cardContainer");
    const syncBtn = document.querySelector('button[onclick="loadAllKeys()"] i');

    syncBtn.classList.add('animate-spin');
    container.innerHTML = `
      <div class="col-span-full py-20 text-center">
        <div class="inline-block animate-bounce mb-4 text-indigo-500">
          <i data-lucide="wifi" class="w-10 h-10"></i>
        </div>
        <p class="text-slate-400 font-medium">Fetching from <span class="text-white font-bold">${currentEnv}</span>...</p>
      </div>`;
    lucide.createIcons();

    try {
      const res = await fetch(`${getBaseUrl()}/GetAllCacheKeys`, {
        method: 'POST',
        headers: { 'accept': '*/*', 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequestBody({ KeyName: "", Source: "" }))
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      allKeysData = (data.CustomObject || []).map(k => ({ key: k.KeyName, service: k.Source, id: k.Id }));
    } catch (err) {
      allKeysData = [];
      container.innerHTML = `
        <div class="col-span-full py-20 text-center opacity-60 border-2 border-dashed border-red-800 rounded-3xl">
          <i data-lucide="wifi-off" class="w-16 h-16 mx-auto mb-4 text-red-500"></i>
          <p class="text-xl font-medium text-red-400">Failed to fetch from ${currentEnv}</p>
          <p class="text-sm text-slate-400 mt-1">${err.message}</p>
        </div>`;
      lucide.createIcons();
      syncBtn.classList.remove('animate-spin');
      return;
    }

    updateServiceDropdown();
    document.getElementById("search").value = "";
    document.getElementById("serviceFilter").value = "all";
    renderCards(allKeysData);
    syncBtn.classList.remove('animate-spin');
  }

  function updateServiceDropdown() {
    const select = document.getElementById('serviceFilter');
    const currentSelection = select.value;
    const activeNames = [...new Set(allKeysData.map(item => item.service))].sort();

    let html = `<option value="all">All Sources (${allKeysData.length} keys)</option>`;
    activeNames.forEach(name => {
      const count = allKeysData.filter(i => i.service === name).length;
      html += `<option value="${name}">${name} (${count})</option>`;
    });

    select.innerHTML = html;
    if (activeNames.includes(currentSelection)) select.value = currentSelection;
  }

  function renderCards(data) {
    const container = document.getElementById("cardContainer");
    document.getElementById("countBadge").innerText = `${data.length} Keys`;
    document.getElementById("activeCount").innerText = [...new Set(data.map(i => i.service))].length;

    if (data.length === 0) {
      container.innerHTML = `
        <div class="col-span-full py-20 text-center opacity-50 border-2 border-dashed border-slate-800 rounded-3xl">
          <i data-lucide="database-zap" class="w-16 h-16 mx-auto mb-4 text-slate-600"></i>
          <p class="text-xl font-medium">Vault is currently empty</p>
          <p class="text-sm">No cache keys found on ${currentEnv}.</p>
        </div>`;
      lucide.createIcons();
      return;
    }

    const colors = ['from-blue-500 to-cyan-400','from-indigo-500 to-purple-400','from-pink-500 to-rose-400','from-emerald-400 to-teal-500'];

    container.innerHTML = data.map((item, index) => `
      <div class="glass-card rounded-3xl p-6 flex flex-col justify-between group">
        <div>
          <div class="flex items-start justify-between mb-4">
            <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${colors[index % colors.length]} flex items-center justify-center shadow-lg transform group-hover:scale-110 transition-transform">
              <i data-lucide="zap" class="w-6 h-6 text-white"></i>
            </div>
            <button onclick="deleteKey('${item.key.replace(/'/g,"\\'")}', '${item.service.replace(/'/g,"\\'")}')"
                    class="p-2 hover:bg-red-500/20 text-red-400 rounded-lg transition-all group-hover:translate-x-0 translate-x-2 opacity-0 group-hover:opacity-100">
              <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
          </div>
          <h3 class="font-bold text-lg text-slate-100 break-all mb-1 leading-tight">${item.key}</h3>
          <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.2em]">${item.service}</p>
        </div>
        <div class="mt-6 flex items-center justify-between border-t border-slate-700/40 pt-4">
          <div class="flex flex-col">
            <span class="text-[10px] text-slate-500 font-bold uppercase">Source</span>
            <span class="text-xs text-slate-300 font-mono">${item.service}</span>
          </div>
          <div class="h-8 w-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
          </div>
        </div>
      </div>
    `).join("");

    lucide.createIcons();
  }

  async function deleteKey(keyName, source) {
    if (!confirm(`Purge [${keyName}] from ${source} on ${currentEnv}?`)) return;
    try {
      await fetch(`${getBaseUrl()}/GetDeleteCacheKey`, {
        method: 'POST',
        headers: { 'accept': '*/*', 'Content-Type': 'application/json' },
        body: JSON.stringify(buildRequestBody({ KeyName: keyName, Source: source }))
      });
    } catch (_) {
      // CORS may block the response but server still processes the delete
    }
    await loadAllKeys();
  }

  function filterData() {
    const searchTerm = document.getElementById("search").value.toLowerCase();
    const serviceTerm = document.getElementById("serviceFilter").value;
    const filtered = allKeysData.filter(item =>
      item.key.toLowerCase().includes(searchTerm) &&
      (serviceTerm === "all" || item.service === serviceTerm)
    );
    renderCards(filtered);
  }

  document.getElementById("search").addEventListener("input", filterData);
  document.getElementById("serviceFilter").addEventListener("change", filterData);

  loadAllKeys();
</script>
</body>
</html>
